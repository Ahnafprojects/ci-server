kind: pipeline
type: docker
name: Build and Deploy

steps:
  - name: Build and Push to Docker Hub
    image: plugins/docker
    settings:
      repo: zeusxd/my-hello-app # Ganti 'zeusxd' jika username Docker Hub Anda berbeda
      tags:
        - latest
        - "${DRONE_BUILD_NUMBER}"
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      
  - name: Deploy to Kubernetes
    image: sinlead/drone-kubernetes
    settings:
      kubernetes_template: |
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: my-hello-app-deployment
          labels:
            app: my-hello-app
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: my-hello-app
          template:
            metadata:
              labels:
                app: my-hello-app
            spec:
              containers:
              - name: my-hello-app
                image: zeusxd/my-hello-app:${DRONE_BUILD_NUMBER} # Ganti 'zeusxd' jika berbeda
                ports:
                - containerPort: 80
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: my-hello-app-service
        spec:
          type: NodePort
          selector:
            app: my-hello-app
          ports:
            - protocol: TCP
              port: 80
              targetPort: 80
              nodePort: 30080
    kubernetes_server:
      from_secret: kubernetes_server
    kubernetes_cert:
      from_secret: kubernetes_cert
    kubernetes_token:
      from_secret: kubernetes_token

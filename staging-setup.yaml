apiVersion: v1
kind: Namespace
metadata:
  name: staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: drone-deployer-role
  namespace: staging
rules:
- apiGroups: ["", "apps", "extensions"]
  resources: ["deployments", "services", "pods", "ingresses", "secrets", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: drone-deployer-staging-binding
  namespace: staging
subjects:
- kind: ServiceAccount
  name: drone-deployer
  namespace: dev # Service Account kita ada di namespace dev
roleRef:
  kind: Role
  name: drone-deployer-role # Kita gunakan lagi Role yang sudah ada
  apiGroup: rbac.authorization.k8s.io

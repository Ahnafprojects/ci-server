apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: drone-deployer
  namespace: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: drone-deployer-role
  namespace: dev
rules:
- apiGroups: ["", "apps", "extensions"]
  resources: ["deployments", "services", "pods", "ingresses", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: drone-deployer-binding
  namespace: dev
subjects:
- kind: ServiceAccount
  name: drone-deployer
  namespace: dev
roleRef:
  kind: Role
  name: drone-deployer-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: drone-deployer-token
  namespace: dev
  annotations:
    kubernetes.io/service-account.name: drone-deployer
type: kubernetes.io/service-account-token

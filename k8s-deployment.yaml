apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-hello-app-deployment
  namespace: dev
  labels:
    app: my-hello-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-hello-app
  template:
    metadata:
      labels:
        app: my-hello-app
    spec:
      containers:
      - name: my-hello-app
        # Tag image akan diganti secara dinamis oleh Drone
        image: zeusxd/my-hello-app:TAG_PLACEHOLDER
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-hello-app-service
  namespace: dev
spec:
  type: NodePort
  selector:
    app: my-hello-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080

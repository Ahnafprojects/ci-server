version: '3.8'

volumes:
  gitea-data:
    driver: local
  postgres-data:
    driver: local
  drone-data:
    driver: local

services:
# ==================================
# 1. DATABASE (PostgreSQL for Gitea)
# ==================================
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=gitea
      - POSTGRES_DB=gitea
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    networks:
      - ci-network

# ==================================
# 2. GITEA (GIT SERVER)
# ==================================
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    depends_on:
      - postgres
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=gitea
      - GITEA__server__ROOT_URL=http://192.168.99.10:3000/
      - GITEA__server__DISABLE_REGISTRATION=true
    volumes:
      - gitea-data:/data
    ports:
      - "3000:3000"
      - "222:22"
    restart: always
    networks:
      - ci-network

# ==================================
# 3. DRONE SERVER (CORE CI/CD)
# ==================================
  drone-server:
    image: drone/drone:latest
    container_name: drone-server
    depends_on:
      - gitea
    environment:
      - DRONE_RPC_SECRET=kunci-rahasia-projek-drone-2025
      - DRONE_SERVER_HOST=192.168.99.10:8000
      - DRONE_SERVER_PROTO=http
      - DRONE_GITEA_SERVER=http://gitea:3000
      - DRONE_GITEA_CLIENT_ID=e59fe27f-cf14-4e17-bf3f-f81e23b5d0cf
      - DRONE_GITEA_CLIENT_SECRET=gto_dvycmmxxb47ms2yyhjxdq6w5alyflz3poug3xcj5wvd74w7vspla
      - DRONE_USER_CREATE=username:admin,admin:true
    volumes:
      - drone-data:/data
    ports:
      - "8000:80"
    restart: always
    networks:
      - ci-network

# ==================================
# 4. DRONE RUNNER (JOB EXECUTION)
# ==================================
  drone-runner:
    image: drone/drone-runner-docker:latest
    container_name: drone-runner
    depends_on:
      - drone-server
    environment:
      - DRONE_RPC_SECRET=kunci-rahasia-projek-drone-2025
      - DRONE_RPC_HOST=drone-server:80
      - DRONE_RPC_PROTO=http
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    networks:
      - ci-network

# ==================================
# DEFINISI JARINGAN
# ==================================
networks:
  ci-network:
    driver: bridge
